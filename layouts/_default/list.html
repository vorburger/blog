{{ define "main" }}
    <h1>{{ .Title }}</h1>
    <div id="post-list">
        {{ range .Pages.GroupByDate "2006" }}
        <div class="year-group">
            <h2>{{ .Key }}</h2>
            {{ range .Pages }}
            <article class="post-item">
                <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
                <div class="date">{{ .Date.Format "January 2, 2006" }}</div>
                <div class="summary">
                    {{ .Summary }}
                </div>
                <div class="tag-list">
                    {{ range .Params.tags }}
                    <a href="{{ "/tags/" | relURL }}#{{ . | urlize }}" class="tag">#{{ . }}</a>
                    {{ end }}
                </div>
            </article>
            {{ end }}
        </div>
        {{ end }}
    </div>
{{ end }}
