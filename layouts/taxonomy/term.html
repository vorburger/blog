{{ define "main" }}
    <h1>Tag: {{ .Title }}</h1>
    <div id="tag-posts">
        <div class="tag-group">
            <ul>
                {{ range .Pages }}
                <li>
                    {{ .Date.Format "2006-01-02" }} 
                    <a href="{{ .RelPermalink }}">{{ .Title }}</a>
                </li>
                {{ end }}
            </ul>
        </div>
    </div>
    <div class="post-nav">
        <div class="post-nav-prev">
            {{ with .Prev }}
            <a href="{{ .RelPermalink }}"><span class="post-nav-arrow">⬅️</span><span class="post-nav-title">{{ .Title }}</span></a>
            {{ end }}
        </div>
        <div class="post-nav-edit"></div>
        <div class="post-nav-next">
            {{ with .Next }}
            <a href="{{ .RelPermalink }}"><span class="post-nav-title">{{ .Title }}</span><span class="post-nav-arrow">➡️</span></a>
            {{ end }}
        </div>
    </div>
{{ end }}
